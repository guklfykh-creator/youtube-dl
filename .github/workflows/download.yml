name: YouTube Downloader

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      format_type:
        description: 'Format type: video or audio'
        required: true
        type: string
      quality:
        description: 'Quality: best, 1080, 720, 480, 360, mp3, m4a'
        required: true
        type: string
      chat_id:
        description: 'Telegram chat ID to send result'
        required: true
        type: string
      username:
        description: 'Telegram username of target user (for MTProto peer resolution)'
        required: false
        type: string
      language:
        description: 'User language: fa or en'
        required: false
        default: fa
        type: string

permissions:
  contents: write

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        run: |
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Set up Go
        run: |
          curl -fsSL https://go.dev/dl/go1.22.12.linux-amd64.tar.gz -o /tmp/go.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          /usr/local/go/bin/go version

      - name: Build binary
        run: go build -o youtube-dl-bot .

      - name: Validate Telegram secrets
        run: |
          test -n "$TG_APP_ID"
          test -n "$TG_APP_HASH"
          test -n "$TG_SESSION"
        env:
          TG_APP_ID: ${{ secrets.TG_APP_ID }}
          TG_APP_HASH: ${{ secrets.TG_APP_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}

      - name: Install yt-dlp, ffmpeg and deno
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Decode YouTube cookies
        run: |
          if [ -n "$YT_COOKIES_B64" ]; then
            echo "$YT_COOKIES_B64" | base64 -d > /tmp/yt-cookies.txt
          fi
        env:
          YT_COOKIES_B64: ${{ secrets.YT_COOKIES_B64 }}

      - name: Download video or audio
        id: download
        env:
          URL: ${{ github.event.inputs.url }}
          FORMAT: ${{ github.event.inputs.format_type }}
          QUALITY: ${{ github.event.inputs.quality }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          LANGUAGE: ${{ github.event.inputs.language }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ "$LANGUAGE" = "en" ]; then
            INVALID_FORMAT_TEXT="❌ Invalid format"
            FILE_NOT_FOUND_TEXT="❌ Download failed - file was not found."
          else
            INVALID_FORMAT_TEXT="❌ فرمت نامعتبر"
            FILE_NOT_FOUND_TEXT="❌ خطا در دانلود - فایل یافت نشد."
          fi

          COOKIE_ARGS=()
          if [ -f /tmp/yt-cookies.txt ]; then
            COOKIE_ARGS=(--cookies /tmp/yt-cookies.txt)
          fi

          COMMON_OPTS=(--extractor-retries 3 --retry-sleep extractor:5 --no-progress)

          if [ "$FORMAT" = "video" ]; then
            case "$QUALITY" in
              best)  YT_FMT="bv*+ba/b" ;;
              1080)  YT_FMT="bv*[height<=1080]+ba/b[height<=1080]/bv+ba/b" ;;
              720)   YT_FMT="bv*[height<=720]+ba/b[height<=720]/bv+ba/b" ;;
              480)   YT_FMT="bv*[height<=480]+ba/b[height<=480]/bv+ba/b" ;;
              360)   YT_FMT="bv*[height<=360]+ba/b[height<=360]/bv+ba/b" ;;
              *)     YT_FMT="bv*+ba/b" ;;
            esac
            yt-dlp "${COOKIE_ARGS[@]}" -f "$YT_FMT" --merge-output-format mp4 \
              "${COMMON_OPTS[@]}" -o "/tmp/output.%(ext)s" "$URL"
          elif [ "$FORMAT" = "audio" ]; then
            case "$QUALITY" in
              mp3)
                yt-dlp "${COOKIE_ARGS[@]}" -x --audio-format mp3 --audio-quality 0 \
                  "${COMMON_OPTS[@]}" -o "/tmp/output.%(ext)s" "$URL"
                ;;
              m4a)
                yt-dlp "${COOKIE_ARGS[@]}" -f "ba[ext=m4a]/ba/b" \
                  "${COMMON_OPTS[@]}" -o "/tmp/output.%(ext)s" "$URL"
                ;;
              *)
                yt-dlp "${COOKIE_ARGS[@]}" -x --audio-format mp3 --audio-quality 0 \
                  "${COMMON_OPTS[@]}" -o "/tmp/output.%(ext)s" "$URL"
                ;;
            esac
          else
            MSG=$(jq -n --arg chat "$CHAT_ID" \
              --arg text "$INVALID_FORMAT_TEXT" \
              '{chat_id: $chat, text: $text}')
            curl -f -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" -d "$MSG"
            exit 1
          fi

          OUTPUT_FILE=$(ls /tmp/output.* 2>/dev/null | head -1)
          if [ -z "$OUTPUT_FILE" ]; then
            MSG=$(jq -n --arg chat "$CHAT_ID" \
              --arg text "$FILE_NOT_FOUND_TEXT" \
              '{chat_id: $chat, text: $text}')
            curl -f -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" -d "$MSG"
            exit 1
          fi

          echo "OUTPUT_FILE=$OUTPUT_FILE" >> $GITHUB_ENV
          FILE_SIZE=$(stat -c%s "$OUTPUT_FILE")
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV

          VIDEO_TITLE=$(yt-dlp "${COOKIE_ARGS[@]}" --print title "$URL" 2>/dev/null || echo "YouTube Video")
          echo "VIDEO_TITLE<<EOF" >> $GITHUB_ENV
          echo "$VIDEO_TITLE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send file via MTProto (gotd/td)
        if: success()
        env:
          TG_APP_ID: ${{ secrets.TG_APP_ID }}
          TG_APP_HASH: ${{ secrets.TG_APP_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          USERNAME: ${{ github.event.inputs.username }}
          LANGUAGE: ${{ github.event.inputs.language }}
          FORMAT: ${{ github.event.inputs.format_type }}
          OUTPUT_FILE: ${{ env.OUTPUT_FILE }}
          VIDEO_TITLE: ${{ env.VIDEO_TITLE }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ "$LANGUAGE" = "en" ]; then
            TOO_LARGE_TEXT='❌ File is larger than '
            TOO_LARGE_SUFFIX='GB. Please choose a lower quality.'
            UPLOAD_FAILED_PREFIX='❌ Sending the file failed ('
            UPLOAD_FAILED_SUFFIX=' MB). Please try again.'
          else
            TOO_LARGE_TEXT='❌ فایل بیش از '
            TOO_LARGE_SUFFIX='GB است. لطفا کیفیت پایینتر انتخاب کنید.'
            UPLOAD_FAILED_PREFIX='❌ ارسال فایل ناموفق بود ('
            UPLOAD_FAILED_SUFFIX=' MB). لطفا دوباره تلاش کنید.'
          fi

          FILE_SIZE_GB=$((FILE_SIZE / 1073741824))

          if [ "$FILE_SIZE_GB" -ge 2 ]; then
            MSG=$(jq -n \
              --arg chat "$CHAT_ID" \
              --arg size "$FILE_SIZE_GB" \
              --arg prefix "$TOO_LARGE_TEXT" \
              --arg suffix "$TOO_LARGE_SUFFIX" \
              '{chat_id: $chat, text: ($prefix + $size + $suffix)}')
            curl -f -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" -d "$MSG"
            exit 1
          fi

          echo "sending file via MTProto (gotd/td)..."
          set +e
          ./youtube-dl-bot \
            --file "$OUTPUT_FILE" \
            --chat-id "$CHAT_ID" \
            --username "$USERNAME" \
            --format "$FORMAT" \
            --caption "✅ $VIDEO_TITLE" \
            --session session.json
          UPLOAD_STATUS=$?
          set -e

          if [ "$UPLOAD_STATUS" -ne 0 ]; then
            echo "MTProto upload failed, trying Bot API fallback for files <=50MB..."
            FILE_SIZE_MB=$((FILE_SIZE / 1048576))

            if [ "$FILE_SIZE_MB" -le 50 ]; then
              if [ "$FORMAT" = "video" ]; then
                curl -f --retry 3 --retry-delay 10 -s \
                  -F "chat_id=$CHAT_ID" \
                  -F "video=@$OUTPUT_FILE" \
                  -F "caption=✅ $VIDEO_TITLE" \
                  -F "supports_streaming=true" \
                  "https://api.telegram.org/bot$BOT_TOKEN/sendVideo"
              else
                curl -f --retry 3 --retry-delay 10 -s \
                  -F "chat_id=$CHAT_ID" \
                  -F "audio=@$OUTPUT_FILE" \
                  -F "caption=✅ $VIDEO_TITLE" \
                  "https://api.telegram.org/bot$BOT_TOKEN/sendAudio"
              fi
            else
              MSG=$(jq -n \
                --arg chat "$CHAT_ID" \
                --arg size "$FILE_SIZE_MB" \
                --arg prefix "$UPLOAD_FAILED_PREFIX" \
                --arg suffix "$UPLOAD_FAILED_SUFFIX" \
                '{chat_id: $chat, text: ($prefix + $size + $suffix)}')
              curl -f -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
                -H "Content-Type: application/json" -d "$MSG"
              exit 1
            fi
          fi

      - name: Notify error on failure
        if: failure()
        env:
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          LANGUAGE: ${{ github.event.inputs.language }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ "$LANGUAGE" = "en" ]; then
            ERROR_TEXT="❌ Download failed. Please try again or choose a lower quality."
          else
            ERROR_TEXT="❌ خطا در دانلود. لطفا دوباره تلاش کنید یا کیفیت پایینتر انتخاب کنید."
          fi
          MSG=$(jq -n --arg chat "$CHAT_ID" \
            --arg text "$ERROR_TEXT" \
            '{chat_id: $chat, text: $text}')
          curl -f -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" -d "$MSG"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/output.*
          rm -f /tmp/yt-cookies.txt
          rm -f session.json
